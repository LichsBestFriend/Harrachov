<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harrachov 288 - Apartmány</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 1. HERO SEKCE -->
    <section class="hero">
        <img src="images/hero.jpg" alt="Apartmány Harrachov 288" class="hero-image">
        <div class="hero-overlay">
            <h1>Harrachov 288</h1>
        </div>
    </section>

    <!-- 2. FOTOGALERIE CAROUSEL -->
    <section class="carousel-section">
        <div class="carousel">
            <button class="carousel-btn prev" onclick="changeSlide(-1)">&#10094;</button>
            <img id="carousel-image" src="images/interior1.jpg" alt="Interiér apartmánu">
            <button class="carousel-btn next" onclick="changeSlide(1)">&#10095;</button>
        </div>
    </section>

    <!-- 3. KONTROLA DOSTUPNOSTI -->
    <section class="availability-section">
        <div class="container">
            <h2>Zkontrolovat dostupnost</h2>
            <form class="availability-form">
                <div class="form-group">
                    <label for="apartment">Apartmán:</label>
                    <select id="apartment">
                        <option value="">Vyberte apartmán</option>
                        <option value="2kk">Apartmán 2+kk (50 m²)</option>
                        <option value="31">Apartmán 3+1 (70 m²)</option>
                        <option value="3kk">Apartmán 3+kk (80 m²)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="checkin">Příjezd:</label>
                    <input type="date" id="checkin">
                </div>
                <div class="form-group">
                    <label for="checkout">Odjezd:</label>
                    <input type="date" id="checkout">
                </div>
                <button type="button" class="btn-check" onclick="checkAvailability()">Zkontrolovat</button>
            </form>
            <div id="availability-result"></div>
        </div>
    </section>

    <!-- 4. VÝHODY/OKOLÍ -->
    <section class="features-section">
        <div class="container">
            <h2>V okolí</h2>
            <ul class="features-list">
                <li> femboys</li>
                <li> furries</li>
                <li> idk</li>
                <li> idk</li>
                <li> nejsem tak kreativni</li>
            </ul>
        </div>
    </section>

    <!-- 5. KALENDÁŘ -->
    <section class="calendar-section">
        <div class="container">
            <h2>Kalendář dostupnosti</h2>
            <div class="calendar-controls">
                <label for="cal-apartment">Zobrazit kalendář pro:</label>
                <select id="cal-apartment">
                    <option value="2kk">Apartmán 2+kk</option>
                    <option value="31">Apartmán 3+1</option>
                    <option value="3kk">Apartmán 3+kk</option>
                </select>
            </div>
            <div id="calendar" class="calendar-placeholder">
                <p>tohle bude FRONT END ktery bude mit BACK END v google DOC?</p>
                <p>tohle bude FRONT END ktery bude mit BACK END v google DOC?</p>
            </div>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
